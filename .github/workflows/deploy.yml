name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Если твоя главная ветка называется master, поменяй тут на master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Говорим серверу выполнять все команды внутри папки client
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build

      # Загружаем собранный проект (он теперь лежит в client/dist)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./client/dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
